name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. new push to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (pytest + ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.24"
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      # Backend tests use in-memory SQLite (and sqlite for the Alembic
      # migration test), so no Postgres/Redis services are required.
      - name: Lint (ruff + mypy)
        run: make lint

      - name: Test with coverage (80% gate)
        run: make coverage

  ui:
    name: UI (vitest + eslint + tsc)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/ui
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.26.2"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: projects/ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint + typecheck (eslint + tsc)
        run: pnpm lint

      - name: Test (vitest)
        run: pnpm test
