services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: naaf
      POSTGRES_PASSWORD: naaf
      POSTGRES_DB: naaf
    ports:
      - "5432:5432"
    volumes:
      - naaf_pg:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  worker:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      naaf_db_url: postgresql+psycopg://naaf:naaf@postgres:5432/naaf
      naaf_celery_broker_url: redis://redis:6379/0
      naaf_worker_roles: "lead,architect,backend,frontend,qa,devops"
volumes:
  naaf_pg:
