services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: naaf
      POSTGRES_PASSWORD: naaf
      POSTGRES_DB: naaf
    ports:
      - "5432:5432"
    volumes:
      - naaf_pg:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"
  # LiteLLM gateway — routes to any provider (OpenAI, Anthropic, etc.)
  # Uncomment and pin a specific tag before use, e.g. ghcr.io/berriai/litellm:main-v1.x.y
  # litellm:
  #   image: ghcr.io/berriai/litellm:main-v1.x.y  # pin a specific tag before uncommenting
  #   ports:
  #     - "4000:4000"
  #   volumes:
  #     - ./litellm.config.yaml:/app/config.yaml
  #   command: ["--config", "/app/config.yaml", "--port", "4000"]
  #   environment:
  #     ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  #     OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  worker:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      naaf_db_url: postgresql+psycopg://naaf:naaf@postgres:5432/naaf
      naaf_celery_broker_url: redis://redis:6379/0
      naaf_agent_runtime: ${naaf_agent_runtime:-fake}
      naaf_anthropic_api_key: ${naaf_anthropic_api_key:-}
      naaf_workspace_root: /workspaces
      naaf_worker_roles: "lead,architect,backend,frontend,qa,devops,curator"
      GH_TOKEN: ${GH_TOKEN:-}
    volumes:
      - naaf_workspaces:/workspaces
volumes:
  naaf_pg:
  naaf_workspaces:
