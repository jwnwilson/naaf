openapi: 3.1.0
info:
  title: NAAF API
  version: 0.1.0
  description: Not Another Agent Framework — API contract for the A2 UI

paths:
  /projects:
    get:
      operationId: listProjects
      summary: List all projects
      parameters:
        - { name: page_size, in: query, schema: { type: integer, default: 50 } }
        - { name: page_number, in: query, schema: { type: integer, default: 1 } }
        - { name: order_by, in: query, schema: { type: string, default: "-createdAt" } }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/Project" } }
                      meta: { $ref: "#/components/schemas/Meta" }
    post:
      operationId: createProject
      summary: Create a project
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Project" }

  /projects/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      operationId: getProject
      summary: Get a project by id
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Project" }
    patch:
      operationId: updateProject
      summary: Update a project
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ProjectUpdate" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Project" }
    delete:
      operationId: deleteProject
      summary: Delete a project
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /projects/{id}/board:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      operationId: getProjectBoard
      summary: Get project board (epic → feature → task tree)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/WorkItem" } }

  /projects/{id}/work-items:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    post:
      operationId: createWorkItem
      summary: Create a work item in a project
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkItemCreate" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/WorkItem" }

  /work-items:
    get:
      operationId: listWorkItems
      summary: List work items with filters
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [backlog, todo, in_progress, in_review, done] } }
        - { name: epic, in: query, schema: { type: string } }
        - { name: project, in: query, schema: { type: string } }
        - { name: page_size, in: query, schema: { type: integer, default: 50 } }
        - { name: page_number, in: query, schema: { type: integer, default: 1 } }
        - { name: order_by, in: query, schema: { type: string, default: "-createdAt" } }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/WorkItem" } }
                      meta: { $ref: "#/components/schemas/Meta" }

  /work-items/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      operationId: getWorkItem
      summary: Get a work item by id
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/WorkItem" }
    patch:
      operationId: updateWorkItem
      summary: Update a work item
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WorkItemUpdate" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/WorkItem" }

  /work-items/{id}/transition:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    post:
      operationId: transitionWorkItem
      summary: Transition work item status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [backlog, todo, in_progress, in_review, done] }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/WorkItem" }
        "409":
          description: invalid transition
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /work-items/{id}/run:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      operationId: getActiveRun
      summary: Get the active agent run for a work item (or null)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/AgentRun"
                          - type: "null"

  /agents:
    get:
      operationId: listAgents
      summary: List live agents
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/Agent" } }

  /agent-definitions:
    get:
      operationId: listAgentDefinitions
      summary: List agent definitions (settings)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/AgentDefinition" } }

  /agent-definitions/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    patch:
      operationId: updateAgentDefinition
      summary: Update agent definition (model / token-limit / system-prompt / enabled)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentDefinitionUpdate" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AgentDefinition" }

  /teams:
    get:
      operationId: listTeams
      summary: List teams
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/Team" } }

  /runs:
    get:
      operationId: listRuns
      summary: List agent runs
      parameters:
        - { name: page_size, in: query, schema: { type: integer, default: 50 } }
        - { name: page_number, in: query, schema: { type: integer, default: 1 } }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/AgentRun" } }
                      meta: { $ref: "#/components/schemas/Meta" }

  /runs/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      operationId: getRun
      summary: Get an agent run by id (steps, logLines, tokenUsage, cost, status)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/AgentRun" }

  /runs/{id}/stream:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      operationId: streamRun
      summary: SSE stream of incremental log lines and step transitions for a run
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /inbox:
    get:
      operationId: listInbox
      summary: List inbox items
      parameters:
        - { name: type, in: query, schema: { type: string, enum: [action_needed, review_needed, info, resolved] } }
        - { name: unread, in: query, schema: { type: boolean } }
        - { name: page_size, in: query, schema: { type: integer, default: 50 } }
        - { name: page_number, in: query, schema: { type: integer, default: 1 } }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/InboxItem" } }
                      meta: { $ref: "#/components/schemas/Meta" }

  /inbox/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      operationId: getInboxItem
      summary: Get an inbox item with its conversation
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/InboxItem" }

  /inbox/{id}/read:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    post:
      operationId: markInboxItemRead
      summary: Mark an inbox item as read
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /inbox/mark-all-read:
    post:
      operationId: markAllInboxRead
      summary: Mark all inbox items as read
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Envelope" }

  /threads:
    get:
      operationId: listThreads
      summary: List chat threads
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/Thread" } }

  /threads/{id}:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      operationId: getThread
      summary: Get thread detail for a work item
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/ThreadDetail" }

  /threads/{id}/messages:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      operationId: listThreadMessages
      summary: List messages in a thread
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/Message" } }
    post:
      operationId: postThreadMessage
      summary: Post a message to a thread
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Message" }

  /threads/{id}/stream:
    parameters:
      - { name: id, in: path, required: true, schema: { type: string } }
    get:
      operationId: streamThread
      summary: SSE stream for agent replies and typing indicators in a thread
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string

  /dashboard/metrics:
    get:
      operationId: getDashboardMetrics
      summary: Get dashboard metrics (active agents, spend, tokens, counts)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/DashboardMetrics" }

  /dashboard/token-usage:
    get:
      operationId: getDashboardTokenUsage
      summary: Get daily token usage series for bar chart
      parameters:
        - { name: days, in: query, schema: { type: integer, default: 7 } }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/TokenUsagePoint" } }

  /activity:
    get:
      operationId: listActivity
      summary: Get activity feed
      parameters:
        - { name: page_size, in: query, schema: { type: integer, default: 20 } }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { type: array, items: { $ref: "#/components/schemas/ActivityEvent" } }

  /budget:
    get:
      operationId: getBudget
      summary: Get workspace token budget
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Envelope"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/Budget" }

  /threads/{id}/activity:
    get:
      operationId: listThreadActivity
      summary: List activity events for a thread
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: after, in: query, required: false, schema: { type: integer, default: 0 } }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/AgentActivityEventOut" }

  /runs/{id}/activity:
    get:
      operationId: listRunActivity
      summary: List activity events for a run
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { name: after, in: query, required: false, schema: { type: integer, default: 0 } }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/AgentActivityEventOut" }

components:
  schemas:
    SecretOut:
      type: object
      required: [name, isSet, hint]
      properties:
        name: { type: string }
        isSet: { type: boolean }
        hint: { type: string }
    SecretSetIn:
      type: object
      required: [value]
      properties:
        value: { type: string }
    Meta:
      type: object
      properties:
        total: { type: integer }
        page_size: { type: integer }
        page_number: { type: integer }

    Envelope:
      type: object
      required: [success]
      properties:
        success: { type: boolean }
        data: { nullable: true }
        error: { type: string, nullable: true }
        meta: { $ref: "#/components/schemas/Meta", nullable: true }

    Attachment:
      type: object
      required: [id, name, size, kind]
      properties:
        id: { type: string }
        name: { type: string }
        size: { type: integer }
        kind: { type: string }

    Agent:
      type: object
      required: [id, name, type, model, status, tokenLimit]
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string, enum: [lead, sub] }
        model: { type: string }
        status: { type: string, enum: [running, idle, paused] }
        currentItemId: { type: string, nullable: true }
        progress: { type: number, minimum: 0, maximum: 1, nullable: true }
        tokenUsage: { type: integer, nullable: true }
        tokenLimit: { type: integer }

    Project:
      type: object
      required: [id, name, repoUrl, itemCount, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        repoUrl: { type: string }
        itemCount: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ProjectCreate:
      type: object
      required: [name, repoUrl]
      properties:
        name: { type: string }
        description: { type: string }
        repoUrl: { type: string }

    ProjectUpdate:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        repoUrl: { type: string }

    WorkItem:
      type: object
      required: [id, key, type, title, status, priority, projectId, createdAt, updatedAt]
      properties:
        id: { type: string }
        key: { type: string }
        type: { type: string, enum: [epic, feature, task] }
        title: { type: string }
        status:
          type: string
          enum: [backlog, todo, in_progress, in_review, done]
        priority: { type: string, enum: [low, medium, high, urgent] }
        assignedAgent: { $ref: "#/components/schemas/Agent", nullable: true }
        epicId: { type: string, nullable: true }
        epicName: { type: string, nullable: true }
        featureId: { type: string, nullable: true }
        featureName: { type: string, nullable: true }
        projectId: { type: string }
        tokenUsageThisRun: { type: integer, nullable: true }
        tokenUsageAllRuns: { type: integer, nullable: true }
        tokenLimit: { type: integer, nullable: true }
        spec: { type: string, nullable: true }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/Attachment" }
          nullable: true
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    WorkItemCreate:
      type: object
      required: [type, title, status, priority]
      properties:
        type: { type: string, enum: [epic, feature, task] }
        title: { type: string }
        status: { type: string, enum: [backlog, todo, in_progress, in_review, done] }
        priority: { type: string, enum: [low, medium, high, urgent] }
        epicId: { type: string }
        featureId: { type: string }
        spec: { type: string }

    WorkItemUpdate:
      type: object
      properties:
        title: { type: string }
        priority: { type: string, enum: [low, medium, high, urgent] }
        epicId: { type: string }
        featureId: { type: string }
        assignedAgentId: { type: string }
        tokenLimit: { type: integer }
        spec: { type: string }

    Team:
      type: object
      required: [id, name]
      properties:
        id: { type: string }
        name: { type: string }

    AgentDefinition:
      type: object
      required: [id, teamId, role, model, tokenLimit, enabled]
      properties:
        id: { type: string }
        teamId: { type: string }
        role: { type: string }
        model: { type: string }
        tokenLimit: { type: integer }
        systemPrompt: { type: string, nullable: true }
        enabled: { type: boolean }

    AgentDefinitionUpdate:
      type: object
      properties:
        model: { type: string }
        tokenLimit: { type: integer }
        systemPrompt: { type: string }
        enabled: { type: boolean }

    InboxItem:
      type: object
      required: [id, type, title, preview, agentId, workItemId, conversationId, createdAt, read]
      properties:
        id: { type: string }
        type: { type: string, enum: [action_needed, review_needed, info, resolved] }
        title: { type: string }
        preview: { type: string }
        agentId: { type: string }
        workItemId: { type: string }
        conversationId: { type: string }
        createdAt: { type: string, format: date-time }
        read: { type: boolean }

    Message:
      type: object
      required: [id, threadId, authorKind, kind, content, mentions, createdAt]
      properties:
        id: { type: string }
        threadId: { type: string }
        authorKind: { type: string, enum: [user, agent] }
        authorRole: { type: string, nullable: true }
        model: { type: string, nullable: true }
        kind: { type: string, enum: [text, file_write, question, event] }
        content: { type: string }
        mentions:
          type: array
          items: { type: string }
        payload:
          type: object
          additionalProperties: true
          nullable: true
        runId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    Thread:
      type: object
      required: [id, workItemId, projectId, title, status, messageCount, participants, createdAt]
      properties:
        id: { type: string }
        workItemId: { type: string }
        projectId: { type: string }
        title: { type: string }
        status: { type: string }
        lastMessage: { type: string, nullable: true }
        messageCount: { type: integer }
        participants:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }

    ThreadParticipant:
      type: object
      required: [kind, role, name]
      properties:
        kind: { type: string, enum: [user, agent] }
        role: { type: string }
        name: { type: string }
        model: { type: string, nullable: true }
        status: { type: string, enum: [running, idle], nullable: true }

    ThreadDetail:
      allOf:
        - $ref: "#/components/schemas/Thread"
        - type: object
          required: [filesWritten, participantDetails]
          properties:
            filesWritten:
              type: array
              items:
                type: object
                additionalProperties: true
            participantDetails:
              type: array
              items: { $ref: "#/components/schemas/ThreadParticipant" }

    RunStep:
      type: object
      required: [index, label, status]
      properties:
        index: { type: integer }
        label: { type: string, enum: [Plan, Read, Analyze, Generate, Test, PR] }
        status: { type: string, enum: [done, active, pending] }

    LogLine:
      type: object
      required: [timestamp, type]
      properties:
        timestamp: { type: string, format: date-time }
        type: { type: string, enum: [tool_call, result, status] }
        tool: { type: string, nullable: true }
        target: { type: string, nullable: true }
        message: { type: string, nullable: true }

    AgentRun:
      type: object
      required: [id, agentId, workItemId, status, steps, logLines, tokenUsage, cost, startedAt, tokenLimit]
      properties:
        id: { type: string }
        agentId: { type: string }
        workItemId: { type: string }
        status: { type: string, enum: [running, paused, complete, failed] }
        steps:
          type: array
          items: { $ref: "#/components/schemas/RunStep" }
        logLines:
          type: array
          items: { $ref: "#/components/schemas/LogLine" }
        tokenUsage: { type: integer }
        tokenLimit: { type: integer }
        cost: { type: number }
        startedAt: { type: string, format: date-time }

    StageStateOut:
      type: object
      required: [stage, status]
      properties:
        stage: { type: string }
        status: { type: string }
        role: { type: string, nullable: true }
        startedAt: { type: string, format: date-time, nullable: true }
        endedAt: { type: string, format: date-time, nullable: true }

    RunOut:
      type: object
      required: [id, workItemId, projectId, autonomyLevel, status, currentStage, stages, createdAt, updatedAt, startedAt, tokenUsage, cost]
      properties:
        id: { type: string }
        workItemId: { type: string }
        projectId: { type: string }
        autonomyLevel: { type: string }
        status: { type: string, enum: [running, awaiting_gate, failed, succeeded, cancelled] }
        currentStage: { type: string }
        stages:
          type: array
          items: { $ref: "#/components/schemas/StageStateOut" }
        pendingGate:
          type: object
          nullable: true
          properties:
            kind: { type: string }
            stage: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        startedAt: { type: string, format: date-time }
        endedAt: { type: string, format: date-time, nullable: true }
        tokenUsage: { type: integer }
        cost: { type: number }
        prUrl: { type: string, nullable: true }

    RunEventOut:
      type: object
      required: [id, runId, seq, stage, type, payload, createdAt]
      properties:
        id: { type: string }
        runId: { type: string }
        seq: { type: integer }
        stage: { type: string }
        role: { type: string, nullable: true }
        type: { type: string }
        payload:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }

    DashboardMetrics:
      type: object
      required: [activeAgents, totalSpend, totalTokens, projectCount, workItemCount]
      properties:
        activeAgents: { type: integer }
        totalSpend: { type: number }
        totalTokens: { type: integer }
        projectCount: { type: integer }
        workItemCount: { type: integer }

    TokenUsagePoint:
      type: object
      required: [day, tokens]
      properties:
        day: { type: string, format: date }
        tokens: { type: integer }

    ActivityEvent:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id: { type: string }
        type: { type: string, enum: [agent_write, status_change, run_complete, run_failed] }
        description: { type: string }
        agentId: { type: string, nullable: true }
        workItemId: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    Budget:
      type: object
      required: [used, limit]
      properties:
        used: { type: integer }
        limit: { type: integer }

    AgentActivityEventOut:
      type: object
      required: [seq, kind, payload, createdAt]
      properties:
        seq: { type: integer }
        kind: { type: string }
        payload: { type: object, additionalProperties: true }
        createdAt: { type: string, format: date-time }
